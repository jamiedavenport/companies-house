name: Integration

on:
  schedule:
    # Daily at 06:00 UTC; spots upstream API/spec drift.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  live-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests against the live API
        run: pnpm exec vp test run
        working-directory: packages/sdk
        env:
          CH_API_KEY: ${{ secrets.CH_API_KEY }}
